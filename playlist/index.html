<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0b0f" />
  <link rel="icon" type="image/png" href="../images/icon.png" />
  <title>Playlist on Atheer</title>

  <script>
    (function() {
      var m = document.createElement("meta");
      m.name = "apple-itunes-app";
      m.content = "app-id=6450851063, app-argument=" + window.location.href;
      document.head.appendChild(m);
    })();
  </script>

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Atheer" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0b0f;
      --line: rgba(255,255,255,0.08);
      --ink: #ffffff;
      --muted: rgba(255,255,255,0.45);
      --font: -apple-system,ui-rounded,"SF Pro Rounded","SF Pro Display",BlinkMacSystemFont,"Helvetica Neue","Geeza Pro","Arabic Text",sans-serif;
      --accent: #a78bfa;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    a { color: inherit; text-decoration: none; }

    .bg-glow {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background: radial-gradient(circle at 50% 30%, var(--glow-color, rgba(120,80,200,0.20)), transparent 60%);
      transition: background 800ms ease;
    }

    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      animation: rise 700ms cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 2×2 artwork mosaic */
    .mosaic {
      width: 136px; height: 136px;
      border-radius: 24px; overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .mosaic.single { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .mosaic.two    { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
    .mosaic.three .cell:first-child { grid-row: 1 / 3; }

    .mosaic .cell {
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .mosaic .cell img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    /* playlist badge */
    .playlist-badge {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 22px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(167,139,250,0.14);
      border: 1px solid rgba(167,139,250,0.22);
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent);
    }

    .playlist-badge svg { width: 11px; height: 11px; }

    .playlist-title {
      margin-top: 12px;
      font-size: clamp(1.4rem, 6vw, 1.9rem);
      font-weight: 700; letter-spacing: -0.03em; line-height: 1.1;
    }

    .ep-count {
      margin-top: 6px;
      font-size: 0.88rem; color: var(--muted);
    }

    /* episode list */
    .ep-list {
      width: 100%; margin-top: 20px;
      display: flex; flex-direction: column; gap: 10px;
      text-align: left;
    }

    .ep-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    .ep-art {
      width: 44px; height: 44px; border-radius: 10px; overflow: hidden;
      background: rgba(255,255,255,0.08); flex-shrink: 0;
    }

    .ep-art img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .ep-title {
      font-size: 0.85rem; font-weight: 600;
      color: rgba(255,255,255,0.85);
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    .divider { width: 40px; height: 1px; background: var(--line); margin: 24px auto; }

    .cta-label { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }

    .btn-store {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 0.9rem 1.6rem; border-radius: 999px;
      background: #ffffff; color: #0a0b0f;
      font-size: 0.96rem; font-weight: 700; letter-spacing: -0.01em;
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
      transition: transform 160ms ease, box-shadow 160ms ease;
      width: 100%; max-width: 280px; justify-content: center;
    }

    .btn-store:hover { transform: translateY(-2px); box-shadow: 0 22px 48px rgba(0,0,0,0.5); }
    .btn-store svg { width: 18px; height: 18px; flex-shrink: 0; }

    .footnote { margin-top: 16px; font-size: 0.8rem; color: rgba(255,255,255,0.22); }

    .home-link {
      position: fixed; top: 22px; left: 22px; z-index: 10;
      display: flex; align-items: center; gap: 9px;
      font-size: 0.88rem; font-weight: 600;
      color: rgba(255,255,255,0.45); transition: color 160ms;
    }
    .home-link:hover { color: rgba(255,255,255,0.8); }
    .home-mark { width: 30px; height: 30px; border-radius: 9px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
    .home-mark img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

  <a class="home-link" href="/">
    <span class="home-mark"><img src="../images/icon.png" alt="" /></span>
    Atheer
  </a>

  <div class="bg-glow" id="bg-glow" aria-hidden="true"></div>

  <div class="card">
    <div class="mosaic" id="mosaic"></div>

    <span class="playlist-badge">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M3 18h12v-2H3v2zm0-5h12v-2H3v2zm0-7v2h12V6H3zm14 9.59L20.59 18 22 16.59l-3-3-3 3L17.41 18 19 16.41z"/>
      </svg>
      Playlist
    </span>

    <h1 class="playlist-title" id="playlist-title" dir="auto">A playlist</h1>
    <p class="ep-count" id="ep-count"></p>

    <div class="ep-list" id="ep-list"></div>

    <div class="divider"></div>

    <p class="cta-label">Open this playlist in Atheer<br>to listen, queue episodes, and more.</p>

    <a class="btn-store" href="https://apps.apple.com/app/atheer/id6450851063" target="_blank" rel="noreferrer">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      Get Atheer on the App Store
    </a>

    <p class="footnote">Free to download · Requires iOS 26+</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const title  = params.get("title");
    const eps    = params.getAll("ep").map(v => {
      const parts = v.split("|");
      return { feed: parts[0] || "", audio: parts[1] || "", title: parts[2] || "", art: parts[3] || "" };
    });

    if (title) {
      document.getElementById("playlist-title").textContent = title;
      document.title = title + " — Playlist on Atheer";
    }

    const count = eps.length;
    if (count > 0) {
      document.getElementById("ep-count").textContent =
        count === 1 ? "1 episode" : count + " episodes";
    }

    // Build mosaic
    const mosaic = document.getElementById("mosaic");
    const artUrls = [...new Set(eps.map(e => e.art).filter(Boolean))].slice(0, 4);
    if (artUrls.length === 0) {
      mosaic.style.background = "rgba(255,255,255,0.06)";
    } else {
      if (artUrls.length === 1) mosaic.classList.add("single");
      else if (artUrls.length === 2) mosaic.classList.add("two");
      else if (artUrls.length === 3) mosaic.classList.add("three");

      artUrls.forEach(url => {
        const cell = document.createElement("div");
        cell.className = "cell";
        const img = document.createElement("img");
        img.src = url;
        img.alt = "";
        img.onload = () => {
          // Use first artwork for ambient glow
          if (cell === mosaic.firstChild) {
            try {
              const canvas = document.createElement("canvas");
              canvas.width = canvas.height = 1;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, 1, 1);
              const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
              document.getElementById("bg-glow").style.setProperty(
                "--glow-color", `rgba(${r},${g},${b},0.24)`
              );
            } catch (_) {}
          }
        };
        cell.appendChild(img);
        mosaic.appendChild(cell);
      });
    }

    // Build episode list
    const list = document.getElementById("ep-list");
    eps.forEach(ep => {
      if (!ep.title) return;
      const row = document.createElement("div");
      row.className = "ep-row";

      const artDiv = document.createElement("div");
      artDiv.className = "ep-art";
      if (ep.art) {
        const img = document.createElement("img");
        img.src = ep.art; img.alt = "";
        artDiv.appendChild(img);
      }

      const titleEl = document.createElement("div");
      titleEl.className = "ep-title";
      titleEl.textContent = ep.title;
      titleEl.dir = "auto";

      row.appendChild(artDiv);
      row.appendChild(titleEl);
      list.appendChild(row);
    });
  </script>
</body>
</html>
