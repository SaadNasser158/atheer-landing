<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0b0f" />
  <link rel="icon" type="image/png" href="../images/icon.png" />
  <title>Listen on Atheer</title>

  <!-- Smart App Banner — app-argument is the short link itself; the app resolves it. -->
  <script>
    (function() {
      var m = document.createElement("meta");
      m.name = "apple-itunes-app";
      m.content = "app-id=6450851063, app-argument=" + window.location.href;
      document.head.appendChild(m);
    })();
  </script>

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Atheer" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0b0f;
      --line: rgba(255,255,255,0.08);
      --ink: #ffffff;
      --muted: rgba(255,255,255,0.45);
      --font: -apple-system,ui-rounded,"SF Pro Rounded","SF Pro Display",BlinkMacSystemFont,"Helvetica Neue","Geeza Pro","Arabic Text",sans-serif;
      --accent: #a78bfa;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    a { color: inherit; text-decoration: none; }

    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(circle at 50% 30%, var(--glow-color, rgba(120,80,200,0.22)), transparent 60%);
      transition: background 800ms ease;
    }

    .card {
      position: relative; z-index: 1; width: 100%; max-width: 420px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      animation: rise 700ms cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .artwork-wrap {
      position: relative; width: 120px; height: 120px; border-radius: 22px;
      overflow: hidden; flex-shrink: 0; box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06);
    }
    .artwork-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .artwork-placeholder {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    }
    .artwork-placeholder svg { width: 38px; height: 38px; color: rgba(255,255,255,0.2); }

    .badge {
      display: inline-flex; align-items: center; gap: 5px; margin-top: 24px;
      padding: 4px 10px; border-radius: 999px;
      background: rgba(167,139,250,0.14); border: 1px solid rgba(167,139,250,0.22);
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent);
    }
    .badge svg { width: 11px; height: 11px; }

    .main-title {
      margin-top: 12px; font-size: clamp(1.2rem, 5vw, 1.6rem);
      font-weight: 700; letter-spacing: -0.03em; line-height: 1.15;
    }
    .sub-title { margin-top: 8px; font-size: 0.9rem; color: var(--muted); }

    .divider { width: 40px; height: 1px; background: var(--line); margin: 26px auto; }

    .cta-label { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }

    .btn-store {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 0.9rem 1.6rem; border-radius: 999px; background: #ffffff; color: #0a0b0f;
      font-size: 0.96rem; font-weight: 700; letter-spacing: -0.01em;
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
      transition: transform 160ms ease, box-shadow 160ms ease;
      width: 100%; max-width: 280px; justify-content: center;
    }
    .btn-store:hover { transform: translateY(-2px); box-shadow: 0 22px 48px rgba(0,0,0,0.5); }
    .btn-store svg { width: 18px; height: 18px; flex-shrink: 0; }

    .footnote { margin-top: 16px; font-size: 0.8rem; color: rgba(255,255,255,0.22); }

    .home-link {
      position: fixed; top: 22px; left: 22px; z-index: 10;
      display: flex; align-items: center; gap: 9px;
      font-size: 0.88rem; font-weight: 600; color: rgba(255,255,255,0.45);
      transition: color 160ms;
    }
    .home-link:hover { color: rgba(255,255,255,0.8); }
    .home-mark {
      width: 30px; height: 30px; border-radius: 9px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
    }
    .home-mark img { width: 100%; height: 100%; object-fit: cover; }

    .loading { opacity: 0.4; font-size: 0.9rem; margin-top: 32px; }
  </style>
</head>
<body>

  <a class="home-link" href="/">
    <span class="home-mark"><img src="../images/icon.png" alt="" /></span>
    Atheer
  </a>

  <div class="bg-glow" id="bg-glow" aria-hidden="true"></div>

  <div class="card" id="card">
    <p class="loading" id="loading">Loading…</p>
  </div>

  <script>
    // Extract slug from /l/<slug>
    const slug = window.location.pathname.replace(/^\/l\//, "").replace(/\/$/, "");

    if (!slug || !/^[0-9A-Za-z]{6}$/.test(slug)) {
      document.getElementById("loading").textContent = "Invalid link.";
    } else {
      fetch("/api/links/" + slug)
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(renderMeta)
        .catch(() => {
          document.getElementById("loading").textContent = "Link not found or expired.";
        });
    }

    function renderMeta(meta) {
      const card = document.getElementById("card");

      // Artwork
      const artworkWrap = document.createElement("div");
      artworkWrap.className = "artwork-wrap";
      const placeholder = document.createElement("div");
      placeholder.className = "artwork-placeholder";
      placeholder.innerHTML = artworkIcon(meta.type);
      artworkWrap.appendChild(placeholder);

      if (meta.artworkUrl) {
        const img = document.createElement("img");
        img.alt = meta.title || "";
        img.src = meta.artworkUrl;
        img.onload = () => {
          placeholder.replaceWith(img);
          try {
            const canvas = document.createElement("canvas");
            canvas.width = canvas.height = 1;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, 1, 1);
            const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
            document.getElementById("bg-glow").style.setProperty(
              "--glow-color", `rgba(${r},${g},${b},0.28)`
            );
          } catch (_) {}
        };
      }

      // Badge
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.innerHTML = badgeIcon(meta.type) + badgeLabel(meta.type, meta.startTime);

      // Title
      const mainTitle = document.createElement("h1");
      mainTitle.className = "main-title";
      mainTitle.dir = "auto";
      mainTitle.textContent = meta.title || "Listen on Atheer";

      // Sub-title
      const subTitle = document.createElement("p");
      subTitle.className = "sub-title";
      subTitle.dir = "auto";
      if (meta.podcastTitle) subTitle.textContent = meta.podcastTitle;

      // Divider + CTA
      const divider = document.createElement("div");
      divider.className = "divider";

      const ctaLabel = document.createElement("p");
      ctaLabel.className = "cta-label";
      ctaLabel.textContent = ctaText(meta.type);

      // App Store button
      const btn = document.createElement("a");
      btn.className = "btn-store";
      btn.id = "store-btn";
      btn.href = "https://apps.apple.com/app/atheer/id6450851063";
      btn.target = "_blank";
      btn.rel = "noreferrer";
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        Get Atheer on the App Store`;

      const footnote = document.createElement("p");
      footnote.className = "footnote";
      footnote.textContent = "Free to download · Requires iOS 26+";

      // OG tags (best-effort for crawlers that run JS)
      setOG("og:title", meta.title || "Listen on Atheer");
      setOG("og:description", meta.podcastTitle || "Open in Atheer");
      if (meta.artworkUrl) setOG("og:image", meta.artworkUrl);
      if (meta.title) document.title = meta.title + " — Listen on Atheer";

      card.innerHTML = "";
      card.append(artworkWrap, badge, mainTitle, subTitle, divider, ctaLabel, btn, footnote);
    }

    function artworkIcon(type) {
      if (type === "podcast") {
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/>
          <line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/>
        </svg>`;
      }
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12h2m4-7v14M12 5v14m4-11v8m4-5v2"/>
      </svg>`;
    }

    function badgeIcon(type) {
      if (type === "podcast") {
        return `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/><path d="M12 1a11 11 0 100 22A11 11 0 0012 1zm0 2a9 9 0 110 18A9 9 0 0112 3z"/>
        </svg>`;
      }
      return `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 3a9 9 0 100 18A9 9 0 0012 3zM9.5 8.5l5 3.5-5 3.5V8.5z"/>
      </svg>`;
    }

    function badgeLabel(type, startTime) {
      if (type === "podcast") return "Podcast";
      if (type === "playlist") return "Playlist";
      if (startTime) return "Episode · " + formatTime(startTime);
      return "Episode";
    }

    function ctaText(type) {
      if (type === "podcast") return "Follow this podcast in Atheer\nto get every episode.";
      if (type === "playlist") return "Open this playlist in Atheer\nto listen and explore.";
      return "Open this episode in Atheer\nto listen, read transcripts, and more.";
    }

    function formatTime(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      if (h > 0) return h + ":" + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
      return m + ":" + String(s).padStart(2,"0");
    }

    function setOG(prop, content) {
      let el = document.querySelector(`meta[property="${prop}"]`);
      if (!el) { el = document.createElement("meta"); el.setAttribute("property", prop); document.head.appendChild(el); }
      el.setAttribute("content", content);
    }
  </script>
</body>
</html>
