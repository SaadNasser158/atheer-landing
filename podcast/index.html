<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0b0f" />
  <link rel="icon" type="image/png" href="../images/icon.png" />
  <title>Listen on Atheer</title>

  <!-- Smart App Banner — app-argument passes the full URL to the app
       so "Open" triggers onContinueUserActivity with the podcast params. -->
  <script>
    (function() {
      var m = document.createElement("meta");
      m.name = "apple-itunes-app";
      m.content = "app-id=6450851063, app-argument=" + window.location.href;
      document.head.appendChild(m);
    })();
  </script>

  <!-- Open Graph — filled by JS from query params -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Atheer" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0b0f;
      --surface: rgba(255,255,255,0.05);
      --line: rgba(255,255,255,0.08);
      --ink: #ffffff;
      --muted: rgba(255,255,255,0.45);
      --font: -apple-system,ui-rounded,"SF Pro Rounded","SF Pro Display",BlinkMacSystemFont,"Helvetica Neue","Geeza Pro","Arabic Text",sans-serif;
      --accent: #a78bfa;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* ambient glow keyed to artwork color — updated by JS */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(circle at 50% 30%, var(--glow-color, rgba(120,80,200,0.22)), transparent 60%);
      transition: background 800ms ease;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
      animation: rise 700ms cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* artwork */
    .artwork-wrap {
      position: relative;
      width: 148px;
      height: 148px;
      border-radius: 26px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
    }

    .artwork-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .artwork-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .artwork-placeholder svg {
      width: 44px;
      height: 44px;
      color: rgba(255,255,255,0.2);
    }

    /* text */
    .shared-label {
      margin-top: 28px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .podcast-name {
      margin-top: 10px;
      font-size: clamp(1.5rem, 6vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
    }

    .podcast-author {
      margin-top: 6px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    /* divider */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--line);
      margin: 28px auto;
    }

    /* CTA */
    .cta-label {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .btn-store {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0.9rem 1.6rem;
      border-radius: 999px;
      background: #ffffff;
      color: #0a0b0f;
      font-size: 0.96rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
      transition: transform 160ms ease, box-shadow 160ms ease;
      width: 100%;
      max-width: 280px;
      justify-content: center;
    }

    .btn-store:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 48px rgba(0,0,0,0.5);
    }

    .btn-store svg { width: 18px; height: 18px; flex-shrink: 0; }

    .footnote {
      margin-top: 16px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.22);
    }

    /* back to home */
    .home-link {
      position: fixed;
      top: 22px;
      left: 22px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 0.88rem;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      transition: color 160ms;
    }

    .home-link:hover { color: rgba(255,255,255,0.8); }

    .home-mark {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .home-mark img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

  <a class="home-link" href="/">
    <span class="home-mark"><img src="../images/icon.png" alt="" /></span>
    Atheer
  </a>

  <div class="bg-glow" id="bg-glow" aria-hidden="true"></div>

  <div class="card">
    <div class="artwork-wrap" id="artwork-wrap">
      <div class="artwork-placeholder" id="artwork-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
    </div>

    <p class="shared-label">Shared podcast</p>
    <h1 class="podcast-name" id="podcast-name" dir="auto">A podcast</h1>
    <p class="podcast-author" id="podcast-author" dir="auto"></p>

    <div class="divider"></div>

    <p class="cta-label">Open this podcast in Atheer<br>to listen, read transcripts, and more.</p>

    <a class="btn-store" id="store-btn" href="https://apps.apple.com/app/atheer/id6450851063" target="_blank" rel="noreferrer">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      Get Atheer on the App Store
    </a>

    <p class="footnote">Free to download · Requires iOS 26+</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name   = params.get("name");
    const art    = params.get("art");
    const author = params.get("author");

    // Podcast name
    if (name) {
      document.getElementById("podcast-name").textContent = name;
      document.title = name + " — Listen on Atheer";
    }

    // Author
    if (author) {
      document.getElementById("podcast-author").textContent = author;
    }

    // Artwork
    if (art) {
      const img = document.createElement("img");
      img.alt = name || "Podcast artwork";
      img.src = art;
      img.onload = () => {
        document.getElementById("artwork-placeholder").replaceWith(img);
        // tint the background glow to roughly match — use a canvas pixel sample
        try {
          const canvas = document.createElement("canvas");
          canvas.width = canvas.height = 1;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, 1, 1);
          const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
          document.getElementById("bg-glow").style.setProperty(
            "--glow-color",
            `rgba(${r},${g},${b},0.28)`
          );
        } catch (_) {}
      };
      img.onerror = () => {}; // keep placeholder
    }
  </script>
</body>
</html>
